version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5002:5002"
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=super_secret_production_key_123
      - CORS_ORIGIN=http://localhost:5173
      - PORT=5002
    volumes:
      - ./backend/prisma:/app/prisma
    working_dir: /app

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5002/api/v1
    ports:
      - "5173:5173"
    depends_on:
      - backend

  ml_service:
    build: ./ml_service
    ports:
      - "8000:8000"
